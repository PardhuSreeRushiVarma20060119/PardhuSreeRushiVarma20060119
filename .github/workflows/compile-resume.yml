name: Compile Resume

on:
  push:
    branches: [main]
    paths:
      - "resume/pardhu.tex"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume/pardhu.tex

      - name: Copy compiled PDF to public
        run: |
          mkdir -p public/resume
          mv pardhu.pdf public/resume/pardhu.pdf

      - name: Commit compiled PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: auto-compile resume PDF"
          file_pattern: public/resume/pardhu.pdf
